<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV-MF - Painel de Movimentações</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        /* Tela de Login */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 350px;
            width: 100%;
        }
        
        .login-box h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #333;
        }
        
        .login-box p {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }
        
        .login-box input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 3px;
        }
        
        .login-box input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .login-box button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .login-box button:hover {
            transform: scale(1.02);
        }
        
        .login-erro {
            color: #dc3545;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
        
        .hidden {
            display: none !important;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        
        header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        header .ultima-atualizacao {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .card-saldo {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        .card-saldo .titulo {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .card-saldo .valor {
            font-size: 42px;
            font-weight: bold;
            color: #28a745;
            margin-bottom: 10px;
        }
        
        .card-saldo .info {
            font-size: 14px;
            color: #888;
        }
        
        .card-saldo .info span {
            font-weight: bold;
            color: #333;
        }
        
        .resumo-formas {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }
        
        .forma-pagamento {
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #555;
        }
        
        .forma-pagamento strong {
            color: #28a745;
        }
        
        .secao-titulo {
            color: white;
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .movimentacoes {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .card-movimentacao {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-movimentacao.entrada {
            border-left: 4px solid #28a745;
        }
        
        .card-movimentacao.saida {
            border-left: 4px solid #dc3545;
        }
        
        .mov-info {
            flex: 1;
        }
        
        .mov-categoria {
            font-weight: bold;
            color: #333;
            margin-bottom: 3px;
        }
        
        .mov-detalhes {
            font-size: 12px;
            color: #888;
        }
        
        .mov-valor {
            font-size: 20px;
            font-weight: bold;
        }
        
        .mov-valor.entrada {
            color: #28a745;
        }
        
        .mov-valor.saida {
            color: #dc3545;
        }
        
        .separador-dia {
            color: white;
            font-size: 13px;
            padding: 8px 0;
            opacity: 0.9;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            margin-top: 10px;
        }
        
        .vazio {
            text-align: center;
            color: white;
            padding: 40px;
            opacity: 0.8;
        }
        
        .btn-atualizar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: white;
            border: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s;
        }
        
        .btn-atualizar:hover {
            transform: scale(1.1);
        }
        
        .btn-atualizar.girando {
            animation: girar 1s linear infinite;
        }
        
        @keyframes girar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .erro {
            background: #dc3545;
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .total-periodo {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #ddd;
        }
        
        .total-periodo div {
            text-align: center;
        }
        
        .total-periodo .label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
        }
        
        .total-periodo .valor-entrada {
            font-size: 18px;
            font-weight: bold;
            color: #28a745;
        }
        
        .total-periodo .valor-saida {
            font-size: 18px;
            font-weight: bold;
            color: #dc3545;
        }
        
        .filtro-periodo {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .btn-filtro {
            padding: 8px 16px;
            border: 2px solid rgba(255,255,255,0.5);
            background: transparent;
            color: white;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-filtro.ativo {
            background: white;
            color: #667eea;
            border-color: white;
            font-weight: bold;
        }
        
        .btn-filtro:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .btn-filtro.ativo:hover {
            background: white;
        }
    </style>
</head>
<body>
    <!-- Tela de Login -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h1>🔒 PDV-MF</h1>
            <p>Digite a senha para acessar o painel</p>
            <input type="password" id="senhaInput" placeholder="••••••" maxlength="20" autocomplete="off">
            <button onclick="verificarSenha()">Entrar</button>
            <div class="login-erro" id="loginErro">Senha incorreta!</div>
        </div>
    </div>
    
    <!-- Conteúdo Principal (escondido até login) -->
    <div class="container hidden" id="conteudoPrincipal">
        <header>
            <h1>📊 PDV-MF</h1>
            <div class="ultima-atualizacao" id="ultimaAtualizacao">Carregando...</div>
        </header>
        
        <div class="card-saldo">
            <div class="titulo">💰 Saldo do Dia</div>
            <div class="valor" id="saldoDia">R$ 0,00</div>
            <div class="info">
                <span id="qtdMovimentacoes">0</span> movimentações hoje
            </div>
            <div class="resumo-formas" id="resumoFormas"></div>
            <div class="total-periodo">
                <div>
                    <div class="label" id="labelEntradas">Entradas (hoje)</div>
                    <div class="valor-entrada" id="totalEntradas">R$ 0,00</div>
                </div>
                <div>
                    <div class="label" id="labelSaidas">Saídas (hoje)</div>
                    <div class="valor-saida" id="totalSaidas">R$ 0,00</div>
                </div>
            </div>
        </div>
        
        <div class="secao-titulo">📋 Movimentações</div>
        
        <div class="filtro-periodo">
            <button class="btn-filtro ativo" onclick="filtrarPeriodo('hoje')" id="btnHoje">Hoje</button>
            <button class="btn-filtro" onclick="filtrarPeriodo('4dias')" id="btn4Dias">Últimos 4 dias</button>
        </div>
        
        <div class="movimentacoes" id="movimentacoes">
            <div class="vazio">Carregando movimentações...</div>
        </div>
    </div>
    
    <button class="btn-atualizar hidden" onclick="carregarDados()" id="btnAtualizar" title="Atualizar">
        🔄
    </button>
    
    <script>
        // ========== AUTENTICAÇÃO ==========
        // A senha é definida no arquivo de dados pelo sistema
        const DATA_FILE = 'd8f3a2b9c1e7.json';
        let senhaCorreta = '';
        let todasMovimentacoes = [];
        let periodoAtual = 'hoje';
        
        // Verificar se já está logado (sessão)
        const verificarSessao = () => {
            return sessionStorage.getItem('pdvmf_autenticado') === 'true';
        };
        
        const verificarSenha = async () => {
            const senhaDigitada = document.getElementById('senhaInput').value;
            
            try {
                // Buscar senha do JSON
                const response = await fetch(DATA_FILE + '?' + Date.now());
                const dados = await response.json();
                senhaCorreta = dados.senha || '';
                
                if (senhaDigitada === senhaCorreta) {
                    sessionStorage.setItem('pdvmf_autenticado', 'true');
                    document.getElementById('loginContainer').classList.add('hidden');
                    document.getElementById('conteudoPrincipal').classList.remove('hidden');
                    document.getElementById('btnAtualizar').classList.remove('hidden');
                    carregarDados();
                } else {
                    document.getElementById('loginErro').style.display = 'block';
                    document.getElementById('senhaInput').value = '';
                    document.getElementById('senhaInput').focus();
                }
            } catch (error) {
                alert('Erro ao verificar senha. Tente novamente.');
            }
        };
        
        // Permitir Enter para login
        document.getElementById('senhaInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verificarSenha();
        });
        
        // Verificar sessão ao carregar
        window.onload = async () => {
            if (verificarSessao()) {
                document.getElementById('loginContainer').classList.add('hidden');
                document.getElementById('conteudoPrincipal').classList.remove('hidden');
                document.getElementById('btnAtualizar').classList.remove('hidden');
                carregarDados();
            }
        };
        
        // ========== FUNÇÕES DO PAINEL ==========
        
        const formatarMoeda = (valor) => {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(valor || 0);
        };
        
        const formatarData = (dataStr) => {
            const data = new Date(dataStr);
            return data.toLocaleDateString('pt-BR');
        };
        
        const formatarHora = (dataStr) => {
            const data = new Date(dataStr);
            return data.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        };
        
        const agruparPorDia = (movimentacoes) => {
            const grupos = {};
            movimentacoes.forEach(mov => {
                const dia = formatarData(mov.data_hora);
                if (!grupos[dia]) {
                    grupos[dia] = [];
                }
                grupos[dia].push(mov);
            });
            return grupos;
        };
        
        const filtrarMovimentacoesPorPeriodo = (movimentacoes, periodo) => {
            const hoje = new Date().toLocaleDateString('pt-BR');
            
            if (periodo === 'hoje') {
                return movimentacoes.filter(mov => formatarData(mov.data_hora) === hoje);
            }
            return movimentacoes; // 4 dias (todas)
        };
        
        const calcularSaldoDia = (movimentacoes) => {
            const hoje = new Date().toLocaleDateString('pt-BR');
            let saldo = 0;
            let quantidade = 0;
            const porFormaPagamento = {};
            
            movimentacoes.forEach(mov => {
                const diaMov = formatarData(mov.data_hora);
                if (diaMov === hoje) {
                    if (mov.tipo === 'Entrada') {
                        saldo += mov.valor;
                        // Agrupar por forma de pagamento
                        const forma = mov.forma_pagamento_nome || 'Outros';
                        porFormaPagamento[forma] = (porFormaPagamento[forma] || 0) + mov.valor;
                    } else {
                        saldo -= mov.valor;
                    }
                    quantidade++;
                }
            });
            
            return { saldo, quantidade, porFormaPagamento };
        };
        
        const calcularTotaisPeriodo = (movimentacoes) => {
            let entradas = 0;
            let saidas = 0;
            
            movimentacoes.forEach(mov => {
                if (mov.tipo === 'Entrada') {
                    entradas += mov.valor;
                } else {
                    saidas += mov.valor;
                }
            });
            
            return { entradas, saidas };
        };
        
        const renderizarMovimentacoes = (movimentacoes) => {
            const container = document.getElementById('movimentacoes');
            
            if (!movimentacoes || movimentacoes.length === 0) {
                container.innerHTML = '<div class="vazio">Nenhuma movimentação encontrada</div>';
                return;
            }
            
            const grupos = agruparPorDia(movimentacoes);
            let html = '';
            
            Object.keys(grupos).forEach(dia => {
                html += `<div class="separador-dia">📅 ${dia}</div>`;
                
                grupos[dia].forEach(mov => {
                    const tipoClass = mov.tipo === 'Entrada' ? 'entrada' : 'saida';
                    const sinal = mov.tipo === 'Entrada' ? '+' : '-';
                    
                    html += `
                        <div class="card-movimentacao ${tipoClass}">
                            <div class="mov-info">
                                <div class="mov-categoria">${mov.categoria}</div>
                                <div class="mov-detalhes">
                                    ${formatarHora(mov.data_hora)} • ${mov.forma_pagamento_nome || mov.tipo}
                                    ${mov.observacao ? ' • ' + mov.observacao : ''}
                                </div>
                            </div>
                            <div class="mov-valor ${tipoClass}">
                                ${sinal} ${formatarMoeda(mov.valor)}
                            </div>
                        </div>
                    `;
                });
            });
            
            container.innerHTML = html;
        };
        
        const renderizarResumoFormas = (porFormaPagamento) => {
            const container = document.getElementById('resumoFormas');
            
            if (Object.keys(porFormaPagamento).length === 0) {
                container.innerHTML = '';
                return;
            }
            
            let html = '';
            Object.entries(porFormaPagamento).forEach(([forma, valor]) => {
                html += `<div class="forma-pagamento">${forma}: <strong>${formatarMoeda(valor)}</strong></div>`;
            });
            
            container.innerHTML = html;
        };
        
        const carregarDados = async () => {
            const btn = document.getElementById('btnAtualizar');
            btn.classList.add('girando');
            
            try {
                const response = await fetch(DATA_FILE + '?' + Date.now());
                
                if (!response.ok) {
                    throw new Error('Arquivo não encontrado');
                }
                
                const dados = await response.json();
                todasMovimentacoes = dados.movimentacoes || [];
                
                // Atualizar última atualização
                const atualizacao = new Date(dados.atualizadoEm);
                document.getElementById('ultimaAtualizacao').textContent = 
                    `Atualizado: ${atualizacao.toLocaleString('pt-BR')}`;
                
                // Calcular saldo do dia (sempre do dia atual)
                const { saldo, quantidade, porFormaPagamento } = calcularSaldoDia(todasMovimentacoes);
                document.getElementById('saldoDia').textContent = formatarMoeda(saldo);
                document.getElementById('qtdMovimentacoes').textContent = quantidade;
                
                // Resumo por forma de pagamento
                renderizarResumoFormas(porFormaPagamento);
                
                // Atualizar tudo conforme filtro atual
                atualizarTotaisELista();
                
            } catch (error) {
                console.error('Erro ao carregar dados:', error);
                document.getElementById('movimentacoes').innerHTML = `
                    <div class="erro">
                        ⚠️ Erro ao carregar dados<br>
                        <small>${error.message}</small>
                    </div>
                `;
            } finally {
                btn.classList.remove('girando');
            }
        };
        
        const atualizarTotaisELista = () => {
            const movsFiltradas = filtrarMovimentacoesPorPeriodo(todasMovimentacoes, periodoAtual);
            
            // Atualizar labels
            const labelPeriodo = periodoAtual === 'hoje' ? 'hoje' : '4 dias';
            document.getElementById('labelEntradas').textContent = `Entradas (${labelPeriodo})`;
            document.getElementById('labelSaidas').textContent = `Saídas (${labelPeriodo})`;
            
            // Calcular totais do período filtrado
            const { entradas, saidas } = calcularTotaisPeriodo(movsFiltradas);
            document.getElementById('totalEntradas').textContent = formatarMoeda(entradas);
            document.getElementById('totalSaidas').textContent = formatarMoeda(saidas);
            
            // Renderizar lista
            renderizarMovimentacoes(movsFiltradas);
        };
        
        const filtrarPeriodo = (periodo) => {
            periodoAtual = periodo;
            
            // Atualizar botões
            document.getElementById('btnHoje').classList.toggle('ativo', periodo === 'hoje');
            document.getElementById('btn4Dias').classList.toggle('ativo', periodo === '4dias');
            
            atualizarTotaisELista();
        };
        
        // Carregar dados ao iniciar
        carregarDados();
        
        // Atualizar a cada 2 minutos
        setInterval(carregarDados, 120000);
    </script>
</body>
</html>
